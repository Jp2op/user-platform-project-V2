name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DESTROY to confirm"
        required: true
        type: string

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.8.5"
  TF_WORKING_DIR: "./terraform"
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  validate:
    name: Validate Confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DESTROY" ]; then
            echo "You must type DESTROY exactly to confirm"
            exit 1
          fi

  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    needs: validate
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TF_PIPELINE_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-duration: 3600

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Scale down EKS nodes
        run: |
          CLUSTER_STATUS=$(aws eks describe-cluster \
            --name uplatform-cluster \
            --region ${{ env.AWS_REGION }} \
            --query "cluster.status" \
            --output text 2>/dev/null || echo "NOT_FOUND")

          if [ "$CLUSTER_STATUS" == "ACTIVE" ]; then
            aws eks update-nodegroup-config \
              --cluster-name uplatform-cluster \
              --nodegroup-name uplatform-nodes \
              --region ${{ env.AWS_REGION }} \
              --scaling-config minSize=0,maxSize=4,desiredSize=0 2>/dev/null || true
            sleep 60
          fi

      - name: Empty S3 buckets
        # Must empty versioned buckets before Terraform can delete them
        run: |
          for BUCKET in $(aws s3api list-buckets \
            --query "Buckets[?contains(Name,'uplatform')].Name" \
            --output text); do

            echo "Emptying $BUCKET..."

            # Delete all versioned objects
            VERSIONS=$(aws s3api list-object-versions \
              --bucket "$BUCKET" \
              --query '{Objects: Versions[].{Key:Key,VersionId:VersionId}}' \
              --output json 2>/dev/null)
            if echo "$VERSIONS" | grep -q '"Key"'; then
              echo "$VERSIONS" | aws s3api delete-objects \
                --bucket "$BUCKET" --delete file:///dev/stdin 2>/dev/null || true
            fi

            # Delete all delete markers
            MARKERS=$(aws s3api list-object-versions \
              --bucket "$BUCKET" \
              --query '{Objects: DeleteMarkers[].{Key:Key,VersionId:VersionId}}' \
              --output json 2>/dev/null)
            if echo "$MARKERS" | grep -q '"Key"'; then
              echo "$MARKERS" | aws s3api delete-objects \
                --bucket "$BUCKET" --delete file:///dev/stdin 2>/dev/null || true
            fi

            # Delete any remaining objects
            aws s3 rm s3://"$BUCKET" --recursive 2>/dev/null || true

            echo "Done: $BUCKET"
          done

      - name: Terraform Destroy
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform destroy -auto-approve -input=false 2>&1
        timeout-minutes: 60