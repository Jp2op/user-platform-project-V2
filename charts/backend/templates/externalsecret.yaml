apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.secretRef }}
  labels:
    {{- include "backend.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}

  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore

  target:
    name: {{ .Values.secretRef }}
    creationPolicy: Owner  # ExternalSecret owns the K8s Secret — deleting ES deletes the secret

  # Map Secrets Manager JSON keys → K8s Secret keys
  # K8s Secret keys become env var names in the pod (via envFrom)
  data:
    {{- range .Values.externalSecret.mapping }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        key: {{ $.Values.externalSecret.secretName }}
        property: {{ .remoteKey }}
    {{- end }}
