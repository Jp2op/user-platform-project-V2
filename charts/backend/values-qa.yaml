# QA environment overrides
# Only values that differ from defaults

replicaCount: 1

image:
  tag: "latest"  # updated by CI pipeline on every push to qa branch

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3

# ESO — which Secrets Manager secret to sync and which SA to use
externalSecret:
  secretName: "uplatform/qa/mysql-secret"

eso:
  serviceAccountName: "eso-qa-sa"
