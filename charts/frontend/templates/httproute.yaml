{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "frontend.fullname" . }}
  labels:
    {{- include "frontend.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ include "frontend.fullname" . }}
      sectionName: https

  {{- if .Values.gateway.host }}
  hostnames:
    - {{ .Values.gateway.host | quote }}
  {{- end }}

  rules:
    # Rule 1: /api/* → backend service
    # Gateway API handles this natively — no need for Nginx proxy in K8s
    # (Nginx proxy is for docker-compose local dev only)
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: backend
          port: {{ .Values.backendServicePort }}

    # Rule 2: everything else → frontend service
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "frontend.fullname" . }}
          port: {{ .Values.service.port }}

---
# HTTP → HTTPS redirect
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "frontend.fullname" . }}-redirect
  labels:
    {{- include "frontend.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ include "frontend.fullname" . }}
      sectionName: http

  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
{{- end }}
