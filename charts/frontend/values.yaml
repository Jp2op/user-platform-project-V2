replicaCount: 1

image:
  repository: jayyp2op/uplatform-frontend
  tag: "latest"
  pullPolicy: Always

imagePullSecrets:
  - name: regcred

port: 8080  # nginx-unprivileged listens on 8080

# Backend service — used by nginx proxy_pass (docker-compose fallback)
# and by HTTPRoute to route /api/* at the Gateway level
backendServiceName: backend
backendServicePort: 5000

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

# Gateway API — replaces Ingress
# Creates an ALB with HTTPS + WAF via Gateway + HTTPRoute
gateway:
  enabled: true
  scheme: internet-facing
  certificateArn: ""   # set per env from terraform output
  wafAclArn: ""        # set per env from terraform output
  host: ""             # set per env (e.g. qa.jp2op-project.site)

livenessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 15
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 1

topologySpreadConstraints:
  enabled: true

networkPolicy:
  enabled: true
