apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frontend-qa
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Jp2op/user-platform-project-V2
    targetRevision: main
    path: charts/frontend
    helm:
      releaseName: frontend
      valueFiles:
        - values.yaml
        - values-qa.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: qa
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
